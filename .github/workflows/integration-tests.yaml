name: Run Integration Tests

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: docu_chat
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: docu_chat_postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U docu_chat -d docu_chat_postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      PYTHONPATH: .
      ENV: production
      PORT: "5000"
      DATABASE_URL: postgresql+asyncpg://docu_chat:secret@localhost:5432/docu_chat_postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: docu_chat_postgres
      DB_USER: docu_chat
      DB_PASSWORD: secret
      PGADMIN_PORT: "8080"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_ENABLED: "true"
      REDIS_TTL_SECONDS: "3600"
      SEARCH_API_KEY: test-search-key
      SEARCH_ENGINE_ID: test-search-engine
      USER_SESSION_SECRET: test-user-session-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install asyncpg alembic python-multipart

      - name: Run migrations
        run: |
          alembic upgrade head

      - name: Run integration tests
        run: |
          pytest -q tests/integration --junitxml=integration-test-results.xml

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: integration-test-results.xml
