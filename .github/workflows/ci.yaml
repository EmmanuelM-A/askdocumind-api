name: CI Pipeline

on:
  push:
    branches:
      - develop
    paths:
      - "src/**"
      - "tests/**"
      - "alembic/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/**"
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "src/**"
      - "tests/**"
      - "alembic/**"
      - "requirements.txt"
      - "pytest.ini"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff checks
        run: |
          ruff check src tests

  unit-tests:
    name: Unit Tests
    needs: lint
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    uses: ./.github/workflows/unit-tests.yaml
    with:
      python-version: "3.12"
