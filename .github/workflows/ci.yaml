name: CI Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff checks
        run: |
          ruff check src tests

  unit-tests:
    name: Unit Tests
    needs: lint
    uses: ./.github/workflows/unit-tests.yaml
    with:
      python-version: "3.12"

  integration-tests:
    name: Integration Tests
    needs:
      - lint
      - unit-tests
    if: ${{ vars.ENV == 'production' }}
    uses: ./.github/workflows/integration-tests.yaml
    with:
      python-version: "3.12"
