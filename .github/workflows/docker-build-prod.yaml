name: Docker Build Check (Prod)

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - requirements.txt
      - src/**
      - .github/workflows/docker-build-prod.yaml
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - requirements.txt
      - src/**
      - .github/workflows/docker-build-prod.yaml

jobs:
  docker-build-prod:
    name: Build & Smoke Test (Prod)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: docu_chat
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: docu_chat_postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: docuchat-api:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d \
            --name docuchat-ci-prod \
            --network host \
            -e ENV=production \
            -e PORT=5000 \
            -e DATABASE_URL=postgresql://docu_chat:secret@localhost:5432/docu_chat_postgres \
            -e USER_SESSION_SECRET=ci-prod-secret-key \
            -e SEARCH_API_KEY=dummy \
            -e SEARCH_ENGINE_ID=dummy \
            docuchat-api:prod

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5000/api/health/api; then
              echo ""
              echo "API is up"
              exit 0
            fi
            echo "Attempt $i: not ready yet, retrying in 3s..."
            sleep 3
          done
          echo "API failed to become ready"
          docker logs docuchat-ci-prod
          exit 1

      - name: Print container logs on failure
        if: failure()
        run: docker logs docuchat-ci-prod