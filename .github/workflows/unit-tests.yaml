name: Test Unit

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONPATH: .
      # Required config values so settings import does not fail in tests
      ENV: development
      PORT: "5000"
      DATABASE_URL: postgresql+asyncpg://docu_chat:secret@localhost:5432/docu_chat_postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: docu_chat_postgres
      DB_USER: docu_chat
      DB_PASSWORD: secret
      PGADMIN_PORT: "8080"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_ENABLED: "true"
      REDIS_TTL_SECONDS: "3600"
      SEARCH_API_KEY: test-search-key
      SEARCH_ENGINE_ID: test-search-engine
      USER_SESSION_SECRET: test-user-session-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install asyncpg alembic python-multipart

      - name: Run unit tests
        run: |
          pytest -q tests/unit --junitxml=unit-test-results.xml

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: unit-test-results.xml
