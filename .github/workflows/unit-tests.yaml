name: Run Unit Tests

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONPATH: .
      # Required config values so settings import does not fail in tests
      ENV: development
      HOST: "0.0.0.0"
      PORT: "5000"
      DATABASE_URL: postgresql+asyncpg://ask_docu_mind:secret@localhost:5432/ask_docu_mind_postgres
      USER_SESSION_SECRET: test-user-session-secret
      ANON_SESSION_TTL_HOURS: "24"
      SEARCH_API_KEY: test-search-key
      SEARCH_ENGINE_ID: test-search-engine
      IS_WEB_SEARCH_ENABLED: "false"
      LLM_MODEL_NAME: gpt-4o-mini
      EMBEDDING_MODEL_NAME: text-embedding-3-small
      LLM_TEMPERATURE: "0.7"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest -q tests/unit --junitxml=unit-test-results.xml

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: unit-test-results.xml
